# CI for the @matihlabs/mcp public repo. (Inert inside the matih-beta monorepo —
# GitHub only runs workflows under the REPO-ROOT .github/workflows; this activates
# when the package becomes the root of the public matih-mcp repo.)
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks scans full history
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full-history secret scan
      # The gitleaks BINARY is OSS (MIT). Only the gitleaks/gitleaks-action@v2
      # WRAPPER requires a paid GITLEAKS_LICENSE for GitHub ORGANISATIONS
      # (matih-labs is an org) — it failed CI with "missing gitleaks license".
      # Run the CLI directly instead: same scan, same .gitleaks.toml, no license.
      - name: Install gitleaks CLI
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan for secrets (full history)
        run: gitleaks detect --source . --config .gitleaks.toml --redact -v --exit-code 1
