# Publish @matihlabs/mcp to npm with provenance, from the public repo, on a GitHub Release.
# (Inert in the monorepo; activates at the public repo root.)
#
# Provenance (--provenance) requires OIDC: `id-token: write` + npm >= 9.5 in GitHub Actions.
# Preferred auth is npm TRUSTED PUBLISHING (configured once on npmjs.com for this repo +
# workflow — no token in the repo). If trusted publishing is not set up, provide an automation
# NPM_TOKEN secret and uncomment the NODE_AUTH_TOKEN env below.
#
# NOTE: tokenless trusted publishing requires npm CLI >= 11.5.1. Node 20 ships npm 10.8,
# which CANNOT authenticate via OIDC trusted publishing — `npm publish` exits 1. The
# "Upgrade npm" step below bumps to a trusted-publishing-capable npm before publish.
name: publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC — required for provenance + trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      # Tokenless trusted publishing needs npm >= 11.5.1; node 20 ships npm 10.8.
      # Upgrade before any npm command so `npm publish` can authenticate via OIDC.
      - name: Upgrade npm (trusted-publishing capable)
        run: |
          npm install -g npm@latest
          npm --version
      # Gate the release on a green build + tests (dist is built here, not committed).
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      # Guard: the git tag (e.g. v0.1.0) must match package.json version.
      - name: Verify tag matches package version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi
      - run: npm publish --provenance --access public
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}   # only if NOT using trusted publishing
