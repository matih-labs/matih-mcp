# Auto-publish @matihlabs/mcp to npm whenever a version bump lands on main.
# (Inert in the monorepo — GitHub only runs workflows at the REPO ROOT
# .github/workflows; this activates at the public matih-mcp repo root.)
#
# Flow: bump "version" in package.json -> push to main. This workflow builds,
# tests, npm-publishes with provenance, then tags vX.Y.Z + cuts a GitHub Release.
# No manual `gh release create` needed. IDEMPOTENT: if the version is already on
# npm, it no-ops — so non-version pushes, re-runs, and re-syncs are all safe.
# Manual trigger (Actions tab / `gh workflow run publish.yml`) is also supported.
#
# Auth: npm TRUSTED PUBLISHING (OIDC, tokenless) — configured once on npmjs.com
# for THIS repo + workflow filename (publish.yml). Do NOT rename this file without
# updating the npmjs trusted-publisher config (the OIDC subject pins the workflow
# path). Tokenless trusted publishing requires npm CLI >= 11.5.1; node 20 ships
# npm 10.8, so the "Upgrade npm" step bumps it before publish. `id-token: write`
# is required for both provenance and the OIDC token exchange.
name: publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # push the vX.Y.Z tag + create the GitHub Release
  id-token: write # OIDC — provenance + trusted publishing

concurrency:
  group: publish-matih-mcp
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for tag + release notes
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      # Tokenless trusted publishing needs npm >= 11.5.1; node 20 ships npm 10.8.
      - name: Upgrade npm (trusted-publishing capable)
        run: |
          npm install -g npm@latest
          npm --version
      # Resolve the package version and whether it is ALREADY on npm. The whole
      # publish path is gated on "not yet published", so a push that doesn't bump
      # the version (or a re-run) is a clean no-op — never an error.
      - name: Resolve version + publish state
        id: v
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@matihlabs/mcp@$VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@matihlabs/mcp@$VERSION is already on npm — nothing to publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "::notice::@matihlabs/mcp@$VERSION not on npm — will build, test, publish."
          fi
      - name: Build + test (gate the publish)
        if: steps.v.outputs.already_published == 'false'
        run: |
          npm ci
          npm run build
          npm run typecheck
          npm test
      # The critical gated action. Provenance + OIDC trusted publishing.
      - name: Publish to npm
        if: steps.v.outputs.already_published == 'false'
        run: npm publish --provenance --access public
      # Post-publish bookkeeping: tag the released commit + cut a GitHub Release.
      # Best-effort (|| true) so a pre-existing tag from a prior partial run never
      # fails the workflow AFTER a successful publish.
      - name: Tag + GitHub Release
        if: steps.v.outputs.already_published == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.v.outputs.version }}"
          git tag "$TAG" || true
          git push origin "$TAG" || true
          gh release create "$TAG" --title "$TAG" --generate-notes || true
